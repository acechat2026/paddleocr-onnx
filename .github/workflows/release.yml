  test-windows:
    name: Test on Windows
    runs-on: windows-2022
    needs: [build-windows]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: paddleocr-onnx-windows
          path: bin
      - uses: actions/download-artifact@v4
        with:
          path: models
          pattern: '*'
          merge-multiple: true
      - shell: pwsh
        run: |
          Write-Host "=== Files in bin/ ==="
          Get-ChildItem -Path bin | ForEach-Object { Write-Host $_.Name }
          $det = Get-ChildItem -Recurse -Path models -Filter "*_det.onnx" | Select-Object -First 1
          $rec = Get-ChildItem -Recurse -Path models -Filter "*_rec.onnx" | Select-Object -First 1
          $dict = Get-ChildItem -Recurse -Path models -Filter "ppocr_keys_v5.txt" | Select-Object -First 1
          .\bin\ocr_cli.exe -i tests\DP_CONSOLE.png `
            -d "$($det.FullName)" `
            -r "$($rec.FullName)" `
            --dict "$($dict.FullName)" `
            -o test_output.jpg `
            --json test_result.json
      - uses: actions/upload-artifact@v4
        with:
          name: ocr-test-results-windows
          path: |
            test_output.jpg
            test_result.json
          retention-days: 14

  test-linux:
    name: Test on Linux
    runs-on: ubuntu-22.04
    needs: [build-linux]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: paddleocr-onnx-linux
          path: bin
      - uses: actions/download-artifact@v4
        with:
          path: models
          pattern: '*'
          merge-multiple: true
      - run: |
          chmod +x bin/ocr_cli
          echo "=== ocr_cli dependencies ==="
          ldd bin/ocr_cli
          echo "=== libraries in bin/ ==="
          ls -la bin/*.so* 2>/dev/null || true
          DET_MODEL=$(find models -name "*_det.onnx" | head -n1)
          REC_MODEL=$(find models -name "*_rec.onnx" | head -n1)
          DICT=$(find models -name "ppocr_keys_v5.txt" | head -n1)
          LD_LIBRARY_PATH=bin ./bin/ocr_cli -i tests/DP_CONSOLE.png \
            -d "$DET_MODEL" \
            -r "$REC_MODEL" \
            --dict "$DICT" \
            -o test_output.jpg \
            --json test_result.json
      - uses: actions/upload-artifact@v4
        with:
          name: ocr-test-results-linux
          path: |
            test_output.jpg
            test_result.json
          retention-days: 14

