      - uses: actions/upload-artifact@v4
        with:
          name: ocr-test-results-macos-intel
          path: |
            test_output.jpg
            test_result.json
          retention-days: 14

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-22.04
    needs: [test-windows, test-linux, test-macos-arm64]
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          else
            VERSION="${{ inputs.version }}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Release version: ${VERSION}"
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
      
      - name: Organize release artifacts
        run: |
          mkdir -p release
          
          # Create models package
          echo "Creating models package..."
          mkdir -p release/models/onnx release/models/dicts release/models/paddle

          # Copy ONNX models and dictionaries
          find release-artifacts -name "*.onnx" -exec cp {} release/models/onnx/ \;
          find release-artifacts -name "*.txt" -exec cp {} release/models/dicts/ \;

          # Copy original Paddle models
          find release-artifacts -type d | grep '/models/paddle/PP-OCRv5' | while read src; do
            name=$(basename "$src")
            cp -r "$src" "release/models/paddle/"
          done

          cd release
          tar -czf "paddleocr-onnx-models-${{ steps.version.outputs.version }}.tar.gz" models/
          zip -r "paddleocr-onnx-models-${{ steps.version.outputs.version }}.zip" models/
          cd ..
          
          # Create Windows package
          echo "Creating Windows package..."
          mkdir -p release/windows
          find release-artifacts -path "*/paddleocr-onnx-windows/*" -exec cp -r {} release/windows/ \;
          cd release/windows
          zip -r "../paddleocr-onnx-windows-${{ steps.version.outputs.version }}.zip" .
          cd ../..
          
          # Create Linux package
          echo "Creating Linux package..."
          mkdir -p release/linux
          find release-artifacts -path "*/paddleocr-onnx-linux/*" -exec cp {} release/linux/ \;
          cd release/linux
          chmod +x ocr_cli ocr_server
          tar -czf "../paddleocr-onnx-linux-${{ steps.version.outputs.version }}.tar.gz" .
          cd ../..
          
          # Create macOS ARM64 package
          echo "Creating macOS ARM64 package..."
          mkdir -p release/macos
          find release-artifacts -path "*/paddleocr-onnx-macos/*" -exec cp {} release/macos/ \;
          cd release/macos
          chmod +x ocr_cli ocr_server
          tar -czf "../paddleocr-onnx-macos-${{ steps.version.outputs.version }}.tar.gz" .
          cd ../..

          # Create macOS Intel package (may be missing if runner is queued/fails)
          echo "Creating macOS Intel package..."
          mkdir -p release/macos-intel
          find release-artifacts -path "*/paddleocr-onnx-macos-intel/*" -exec cp {} release/macos-intel/ \;
          if [ -n "$(ls -A release/macos-intel 2>/dev/null)" ]; then
            cd release/macos-intel
            chmod +x ocr_cli ocr_server
            tar -czf "../paddleocr-onnx-macos-intel-${{ steps.version.outputs.version }}.tar.gz" .
            cd ../..
          else
            echo "No macOS Intel binaries found, skipping package."
            rmdir release/macos-intel
          fi

          # Generate checksums
          cd release
          sha256sum *.tar.gz *.zip > checksums.txt
          cat checksums.txt
          cd ..
      
      - name: Generate release notes
        run: |
          cat > release/RELEASE_NOTES.md << 'EOF'
          # PaddleOCR ONNX Runtime ${{ steps.version.outputs.version }}

          ## What's New

          - PP-OCRv5 Server models support
          - Command-line tool (ocr_cli) with GPU/CPU support
          - HTTP server (ocr_server) with RESTful API
          - Cross-platform support (Windows, Linux, macOS)

          ## Models Included

          | Model | Size | Description |
          |-------|------|-------------|
          | PP-OCRv5_server_det.onnx | ~84 MB | Text detection (server version) |
          | PP-OCRv5_server_rec.onnx | ~81 MB | Text recognition (server version) |

          ## Quick Start

          ### Command Line
          ```bash
          ./ocr_cli input.jpg -d models/PP-OCRv5_server_det.onnx -r models/PP-OCRv5_server_rec.onnx --dict models/ppocr_keys_v5.txt
          ```
          EOF

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ASSETS=(
            "release/paddleocr-onnx-models-${VERSION}.tar.gz"
            "release/paddleocr-onnx-models-${VERSION}.zip"
            "release/paddleocr-onnx-windows-${VERSION}.zip"
            "release/paddleocr-onnx-linux-${VERSION}.tar.gz"
            "release/paddleocr-onnx-macos-${VERSION}.tar.gz"
            "release/checksums.txt"
          )
          if [ -f "release/paddleocr-onnx-macos-intel-${VERSION}.tar.gz" ]; then
            ASSETS+=("release/paddleocr-onnx-macos-intel-${VERSION}.tar.gz")
          fi
          gh release create "${VERSION}" \
            --title "PaddleOCR ONNX ${VERSION}" \
            --notes-file release/RELEASE_NOTES.md \
            "${ASSETS[@]}"