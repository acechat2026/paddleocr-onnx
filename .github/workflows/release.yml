# Create GitHub Release with models and binaries

name: Create Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.0.0)'
        required: true
        type: string
      model_version:
        description: 'Model version'
        required: true
        type: choice
        default: 'v5_server'
        options:
          - v5_server
          - v5_mobile
      create_latest:
        description: 'Mark as latest release'
        required: false
        type: boolean
        default: true

jobs:
  convert-models:
    name: Convert Models
    uses: ./.github/workflows/convert-models.yml
    with:
      model_version: ${{ inputs.model_version || 'v5_server' }}
      upload_artifact: true
  
  build-windows:
    name: Build Windows
    runs-on: windows-2022
    needs: convert-models
    env:
      ONNXRUNTIME_VERSION: '1.20.1'
      OPENCV_VERSION: '4.10.0'
      CMAKE_BUILD_TYPE: Release
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: lukka/get-cmake@latest
      - uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64
      - uses: actions/cache@v4
        id: cache-deps
        with:
          path: |
            3rdparty/onnxruntime
            3rdparty/opencv
          key: ${{ runner.os }}-deps-${{ env.ONNXRUNTIME_VERSION }}-${{ env.OPENCV_VERSION }}
      - if: steps.cache-deps.outputs.cache-hit != 'true'
        run: |
          New-Item -ItemType Directory -Force -Path 3rdparty | Out-Null
          $url = "https://github.com/microsoft/onnxruntime/releases/download/v$env:ONNXRUNTIME_VERSION/onnxruntime-win-x64-$env:ONNXRUNTIME_VERSION.zip"
          Invoke-WebRequest -Uri $url -OutFile 3rdparty\onnxruntime.zip
          Expand-Archive -Path 3rdparty\onnxruntime.zip -DestinationPath 3rdparty -Force
          Rename-Item -Path "3rdparty\onnxruntime-win-x64-$env:ONNXRUNTIME_VERSION" -NewName "onnxruntime"
          Remove-Item 3rdparty\onnxruntime.zip
      - if: steps.cache-deps.outputs.cache-hit != 'true'
        run: |
          $url = "https://github.com/opencv/opencv/releases/download/$env:OPENCV_VERSION/opencv-$env:OPENCV_VERSION-windows.exe"
          Invoke-WebRequest -Uri $url -OutFile 3rdparty\opencv.exe
          Start-Process -FilePath "3rdparty\opencv.exe" -ArgumentList "-o3rdparty -y" -Wait -NoNewWindow
          Remove-Item 3rdparty\opencv.exe
      - run: |
          Invoke-WebRequest -Uri "https://raw.githubusercontent.com/jarro2783/cxxopts/v3.1.1/include/cxxopts.hpp" -OutFile "3rdparty\cxxopts.hpp"
          New-Item -ItemType Directory -Force -Path "3rdparty\cpp-httplib" | Out-Null
          Invoke-WebRequest -Uri "https://raw.githubusercontent.com/yhirose/cpp-httplib/v0.14.3/httplib.h" -OutFile "3rdparty\cpp-httplib\httplib.h"
      - run: |
          cmake -B build -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_BUILD_TYPE=$env:CMAKE_BUILD_TYPE `
            -DBUILD_HTTP_SERVER=ON `
            -DOpenCV_DIR="$env:GITHUB_WORKSPACE\3rdparty\opencv\build\x64\vc16\lib"
      - run: cmake --build build --config $env:CMAKE_BUILD_TYPE --parallel
      - run: |
          $outDir = "build\bin\$env:CMAKE_BUILD_TYPE"
          Copy-Item -Path "3rdparty\opencv\build\x64\vc16\bin\opencv_world*.dll" -Destination "$outDir\" -ErrorAction SilentlyContinue
      - uses: actions/upload-artifact@v4
        with:
          name: paddleocr-onnx-windows
          path: |
            build/bin/${{ env.CMAKE_BUILD_TYPE }}/*.exe
            build/bin/${{ env.CMAKE_BUILD_TYPE }}/*.dll
          retention-days: 7

  build-linux:
    name: Build Linux
    runs-on: ubuntu-22.04
    needs: convert-models
    env:
      ONNXRUNTIME_VERSION: '1.20.1'
      OPENCV_VERSION: '4.10.0'
      CMAKE_BUILD_TYPE: Release
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - run: sudo apt update && sudo apt install -y build-essential cmake wget unzip
      - uses: actions/cache@v4
        id: cache-onnx
        with:
          path: 3rdparty/onnxruntime
          key: ${{ runner.os }}-onnx-${{ env.ONNXRUNTIME_VERSION }}
      - if: steps.cache-onnx.outputs.cache-hit != 'true'
        run: |
          mkdir -p 3rdparty && cd 3rdparty
          wget -q "https://github.com/microsoft/onnxruntime/releases/download/v${ONNXRUNTIME_VERSION}/onnxruntime-linux-x64-${ONNXRUNTIME_VERSION}.tgz"
          tar -xzf "onnxruntime-linux-x64-${ONNXRUNTIME_VERSION}.tgz"
          mv "onnxruntime-linux-x64-${ONNXRUNTIME_VERSION}" onnxruntime
          rm "onnxruntime-linux-x64-${ONNXRUNTIME_VERSION}.tgz"
      - uses: actions/cache@v4
        id: cache-opencv
        with:
          path: 3rdparty/opencv/build/install
          key: ${{ runner.os }}-opencv-static-v4-${{ env.OPENCV_VERSION }}
      - if: steps.cache-opencv.outputs.cache-hit != 'true'
        run: |
          mkdir -p 3rdparty && cd 3rdparty
          wget -q "https://github.com/opencv/opencv/archive/${OPENCV_VERSION}.zip" -O opencv.zip
          unzip -q opencv.zip
          mv "opencv-${OPENCV_VERSION}" opencv-src
          cd opencv-src
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$GITHUB_WORKSPACE/3rdparty/opencv/build/install" \
            -DBUILD_SHARED_LIBS=OFF \
            -DBUILD_LIST=core,imgproc,imgcodecs \
            -DWITH_JPEG=ON \
            -DWITH_PNG=ON \
            -DWITH_TIFF=OFF \
            -DWITH_WEBP=OFF \
            -DWITH_OPENEXR=OFF \
            -DWITH_GDAL=OFF \
            -DWITH_GDCM=OFF \
            -DWITH_PROTOBUF=OFF \
            -DWITH_FFMPEG=OFF \
            -DWITH_WIN32UI=OFF \
            -DWITH_QT=OFF \
            -DWITH_GTK=OFF \
            -DBUILD_EXAMPLES=OFF \
            -DBUILD_TESTS=OFF \
            -DBUILD_PERF_TESTS=OFF \
            -DBUILD_opencv_apps=OFF \
            -DBUILD_opencv_python2=OFF \
            -DBUILD_opencv_python3=OFF \
            -DBUILD_opencv_java=OFF \
            -DBUILD_opencv_calib3d=OFF \
            -DBUILD_opencv_features2d=OFF \
            -DBUILD_opencv_flann=OFF \
            -DBUILD_opencv_highgui=OFF \
            -DBUILD_opencv_gapi=OFF \
            -DBUILD_opencv_ml=OFF \
            -DBUILD_opencv_objdetect=OFF \
            -DBUILD_opencv_photo=OFF \
            -DBUILD_opencv_stitching=OFF \
            -DBUILD_opencv_video=OFF \
            -DBUILD_opencv_videoio=OFF
          cmake --build build --parallel $(nproc)
          cmake --install build
      - if: steps.cache-opencv.outputs.cache-hit != 'true'
        run: |
          INSTALL_PREFIX="$GITHUB_WORKSPACE/3rdparty/opencv/build/install"
          mkdir -p "$INSTALL_PREFIX/lib/opencv4/3rdparty"
          # Create dummy static archives for missing 3rdparty dependencies
          # that CMake validates during find_package even when unused.
          for lib in libade.a libprotobuf.a; do
            path="$INSTALL_PREFIX/lib/opencv4/3rdparty/$lib"
            if [ ! -f "$path" ]; then
              ar rcs "$path"
            fi
          done
      - run: |
          mkdir -p 3rdparty/cpp-httplib
          wget -q "https://raw.githubusercontent.com/jarro2783/cxxopts/v3.1.1/include/cxxopts.hpp" -O 3rdparty/cxxopts.hpp
          wget -q "https://raw.githubusercontent.com/yhirose/cpp-httplib/v0.14.3/httplib.h" -O 3rdparty/cpp-httplib/httplib.h
      - run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=${{ env.CMAKE_BUILD_TYPE }} \
            -DBUILD_HTTP_SERVER=ON \
            -DOpenCV_DIR="$GITHUB_WORKSPACE/3rdparty/opencv/build/install/lib/cmake/opencv4"
      - run: cmake --build build --config ${{ env.CMAKE_BUILD_TYPE }} --parallel $(nproc)
      - run: |
          cp 3rdparty/onnxruntime/lib/libonnxruntime.so* build/bin/ 2>/dev/null || true
      - uses: actions/upload-artifact@v4
        with:
          name: paddleocr-onnx-linux
          path: |
            build/bin/ocr_cli
            build/bin/ocr_server
            build/bin/libonnxruntime.so*
          retention-days: 7

