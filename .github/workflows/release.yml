# Create GitHub Release with models and binaries

name: Create Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.0.0)'
        required: true
        type: string
      model_version:
        description: 'Model version'
        required: true
        type: choice
        default: 'v5_server'
        options:
          - v5_server
          - v5_mobile
      create_latest:
        description: 'Mark as latest release'
        required: false
        type: boolean
        default: true

jobs:
  convert-models:
    name: Convert Models
    uses: ./.github/workflows/convert-models.yml
    with:
      model_version: ${{ inputs.model_version || 'v5_server' }}
      upload_artifact: true
  
  build-binaries:
    name: Build Binaries
    needs: convert-models
    uses: ./.github/workflows/build.yml
  
  test-windows:
    name: Test on Windows
    runs-on: windows-2022
    needs: [build-binaries, convert-models]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Windows binaries
        uses: actions/download-artifact@v4
        with:
          name: paddleocr-onnx-windows
          path: bin

      - name: Download model artifacts
        uses: actions/download-artifact@v4
        with:
          path: models
          pattern: '*'
          merge-multiple: true

      - name: Run OCR test
        shell: pwsh
        run: |
          $det = Get-ChildItem -Recurse -Path models -Filter "*_det.onnx" | Select-Object -First 1
          $rec = Get-ChildItem -Recurse -Path models -Filter "*_rec.onnx" | Select-Object -First 1
          $dict = Get-ChildItem -Recurse -Path models -Filter "ppocr_keys_v1.txt" | Select-Object -First 1
          Write-Host "Detection model: $($det.FullName)"
          Write-Host "Recognition model: $($rec.FullName)"
          Write-Host "Dictionary: $($dict.FullName)"
          .\bin\ocr_cli.exe tests\DP_CONSOLE.png `
            -d "$($det.FullName)" `
            -r "$($rec.FullName)" `
            --dict "$($dict.FullName)" `
            -o test_output.jpg `
            --json test_result.json

      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: ocr-test-results-windows
          path: |
            test_output.jpg
            test_result.json
          retention-days: 14

  test-linux:
    name: Test on Linux
    runs-on: ubuntu-22.04
    needs: [build-binaries, convert-models]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Linux binaries
        uses: actions/download-artifact@v4
        with:
          name: paddleocr-onnx-linux
          path: bin

      - name: Download model artifacts
        uses: actions/download-artifact@v4
        with:
          path: models
          pattern: '*'
          merge-multiple: true

      - name: Run OCR test
        run: |
          chmod +x bin/ocr_cli
          DET_MODEL=$(find models -name "*_det.onnx" | head -n1)
          REC_MODEL=$(find models -name "*_rec.onnx" | head -n1)
          DICT=$(find models -name "ppocr_keys_v1.txt" | head -n1)
          echo "Detection model: $DET_MODEL"
          echo "Recognition model: $REC_MODEL"
          echo "Dictionary: $DICT"
          ./bin/ocr_cli tests/DP_CONSOLE.png \
            -d "$DET_MODEL" \
            -r "$REC_MODEL" \
            --dict "$DICT" \
            -o test_output.jpg \
            --json test_result.json

      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: ocr-test-results-linux
          path: |
            test_output.jpg
            test_result.json
          retention-days: 14

  test-macos-arm64:
    name: Test on macOS ARM64
    runs-on: macos-14
    needs: [build-binaries, convert-models]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download macOS binaries
        uses: actions/download-artifact@v4
        with:
          name: paddleocr-onnx-macos
          path: bin

      - name: Download model artifacts
        uses: actions/download-artifact@v4
        with:
          path: models
          pattern: '*'
          merge-multiple: true

      - name: Run OCR test
        run: |
          chmod +x bin/ocr_cli
          DET_MODEL=$(find models -name "*_det.onnx" | head -n1)
          REC_MODEL=$(find models -name "*_rec.onnx" | head -n1)
          DICT=$(find models -name "ppocr_keys_v1.txt" | head -n1)
          echo "Detection model: $DET_MODEL"
          echo "Recognition model: $REC_MODEL"
          echo "Dictionary: $DICT"
          ./bin/ocr_cli tests/DP_CONSOLE.png \
            -d "$DET_MODEL" \
            -r "$REC_MODEL" \
            --dict "$DICT" \
            -o test_output.jpg \
            --json test_result.json

      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: ocr-test-results-macos
          path: |
            test_output.jpg
            test_result.json
          retention-days: 14

  test-macos-intel:
    name: Test on macOS Intel
    runs-on: macos-13
    needs: [build-binaries, convert-models]
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download macOS Intel binaries
        uses: actions/download-artifact@v4
        with:
          name: paddleocr-onnx-macos-intel
          path: bin

      - name: Download model artifacts
        uses: actions/download-artifact@v4
        with:
          path: models
          pattern: '*'
          merge-multiple: true

      - name: Run OCR test
        run: |
          chmod +x bin/ocr_cli
          DET_MODEL=$(find models -name "*_det.onnx" | head -n1)
          REC_MODEL=$(find models -name "*_rec.onnx" | head -n1)
          DICT=$(find models -name "ppocr_keys_v1.txt" | head -n1)
          echo "Detection model: $DET_MODEL"
          echo "Recognition model: $REC_MODEL"
          echo "Dictionary: $DICT"
          ./bin/ocr_cli tests/DP_CONSOLE.png \
            -d "$DET_MODEL" \
            -r "$REC_MODEL" \
            --dict "$DICT" \
            -o test_output.jpg \
            --json test_result.json

      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: ocr-test-results-macos-intel
          path: |
            test_output.jpg
            test_result.json
          retention-days: 14

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-22.04
    needs: [convert-models, build-binaries, test-windows, test-linux, test-macos-arm64]
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          else
            VERSION="${{ inputs.version }}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Release version: ${VERSION}"
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
      
      - name: Organize release artifacts
        run: |
          mkdir -p release
          
          # Create models package
          echo "Creating models package..."
          mkdir -p release/models/onnx release/models/dicts release/models/paddle

          # Copy ONNX models and dictionaries
          find release-artifacts -name "*.onnx" -exec cp {} release/models/onnx/ \;
          find release-artifacts -name "*.txt" -exec cp {} release/models/dicts/ \;

          # Copy original Paddle models
          find release-artifacts -type d | grep '/models/paddle/PP-OCRv5' | while read src; do
            name=$(basename "$src")
            cp -r "$src" "release/models/paddle/"
          done

          cd release
          tar -czf "paddleocr-onnx-models-${{ steps.version.outputs.version }}.tar.gz" models/
          zip -r "paddleocr-onnx-models-${{ steps.version.outputs.version }}.zip" models/
          cd ..
          
          # Create Windows package
          echo "Creating Windows package..."
          mkdir -p release/windows
          find release-artifacts -path "*/paddleocr-onnx-windows/*" -exec cp -r {} release/windows/ \;
          cd release/windows
          zip -r "../paddleocr-onnx-windows-${{ steps.version.outputs.version }}.zip" .
          cd ../..
          
          # Create Linux package
          echo "Creating Linux package..."
          mkdir -p release/linux
          find release-artifacts -path "*/paddleocr-onnx-linux/*" -exec cp {} release/linux/ \;
          cd release/linux
          chmod +x ocr_cli ocr_server
          tar -czf "../paddleocr-onnx-linux-${{ steps.version.outputs.version }}.tar.gz" .
          cd ../..
          
          # Create macOS ARM64 package
          echo "Creating macOS ARM64 package..."
          mkdir -p release/macos
          find release-artifacts -path "*/paddleocr-onnx-macos/*" -exec cp {} release/macos/ \;
          cd release/macos
          chmod +x ocr_cli ocr_server
          tar -czf "../paddleocr-onnx-macos-${{ steps.version.outputs.version }}.tar.gz" .
          cd ../..

          # Create macOS Intel package (may be missing if runner is queued/fails)
          echo "Creating macOS Intel package..."
          mkdir -p release/macos-intel
          find release-artifacts -path "*/paddleocr-onnx-macos-intel/*" -exec cp {} release/macos-intel/ \;
          if [ -n "$(ls -A release/macos-intel 2>/dev/null)" ]; then
            cd release/macos-intel
            chmod +x ocr_cli ocr_server
            tar -czf "../paddleocr-onnx-macos-intel-${{ steps.version.outputs.version }}.tar.gz" .
            cd ../..
          else
            echo "No macOS Intel binaries found, skipping package."
            rmdir release/macos-intel
          fi

          # Generate checksums
          cd release
          sha256sum *.tar.gz *.zip > checksums.txt
          cat checksums.txt
          cd ..
      
      - name: Generate release notes
        run: |
          cat > release/RELEASE_NOTES.md << 'EOF'
          # PaddleOCR ONNX Runtime ${{ steps.version.outputs.version }}

          ## What's New

          - PP-OCRv5 Server models support
          - Command-line tool (ocr_cli) with GPU/CPU support
          - HTTP server (ocr_server) with RESTful API
          - Cross-platform support (Windows, Linux, macOS)

          ## Models Included

          | Model | Size | Description |
          |-------|------|-------------|
          | PP-OCRv5_server_det.onnx | ~84 MB | Text detection (server version) |
          | PP-OCRv5_server_rec.onnx | ~81 MB | Text recognition (server version) |

          ## Quick Start

          ### Command Line
          ```bash
          ./ocr_cli input.jpg -d models/PP-OCRv5_server_det.onnx -r models/PP-OCRv5_server_rec.onnx --dict models/ppocr_keys_v1.txt
          ```
          EOF

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ASSETS=(
            "release/paddleocr-onnx-models-${VERSION}.tar.gz"
            "release/paddleocr-onnx-models-${VERSION}.zip"
            "release/paddleocr-onnx-windows-${VERSION}.zip"
            "release/paddleocr-onnx-linux-${VERSION}.tar.gz"
            "release/paddleocr-onnx-macos-${VERSION}.tar.gz"
            "release/checksums.txt"
          )
          if [ -f "release/paddleocr-onnx-macos-intel-${VERSION}.tar.gz" ]; then
            ASSETS+=("release/paddleocr-onnx-macos-intel-${VERSION}.tar.gz")
          fi
          gh release create "${VERSION}" \
            --title "PaddleOCR ONNX ${VERSION}" \
            --notes-file release/RELEASE_NOTES.md \
            "${ASSETS[@]}"